<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <title>esp-cam dashboard</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="header">
    <div>
      <h1>esp-cam dashboard</h1>
      <p class="subtitle">Live capture, latency metrics, and YOLO detections</p>
    </div>
    <p id="status" class="status">Starting…</p>
  </header>

  <section class="cards" id="summary-cards">
    <article class="card"><span class="label">Captures</span><strong id="stat-count">—</strong></article>
    <article class="card"><span class="label">Avg capture</span><strong id="stat-capture">—</strong></article>
    <article class="card"><span class="label">Avg capture-to-save</span><strong id="stat-latency">—</strong></article>
    <article class="card"><span class="label">Avg inference</span><strong id="stat-inference">—</strong></article>
  </section>

  <main class="layout">
    <section class="panel live-panel">
      <div class="panel-heading">
        <h2>Capture viewer</h2>
        <span id="view-mode" class="mode-badge mode-live">Live</span>
      </div>

      <div id="timetravel" class="timetravel" hidden>
        <div class="timetravel-controls">
          <button id="live-btn" type="button" class="btn btn-live" title="Jump to latest frame" aria-label="Jump to latest frame">Live</button>
          <button id="prev-btn" type="button" class="btn btn-step" title="Older frame" aria-label="Older frame">&#9664;</button>
          <button id="next-btn" type="button" class="btn btn-step" title="Newer frame" aria-label="Newer frame">&#9654;</button>
        </div>
        <input id="scrubber" type="range" min="0" max="0" value="0" step="1" aria-label="Browse capture history">
        <p id="timetravel-label" class="timetravel-label">—</p>
      </div>

      <img id="frame" alt="Camera capture" hidden>
      <p id="empty" class="empty">Waiting for first upload…</p>
      <dl id="meta" hidden></dl>
      <ul id="detections" hidden></ul>
    </section>

    <section class="panel charts-panel">
      <h2>Timing timeline</h2>
      <div class="chart-wrap">
        <canvas id="latency-chart"></canvas>
      </div>

      <h2>Detection count</h2>
      <div class="chart-wrap">
        <canvas id="detection-chart"></canvas>
      </div>

      <h2>Class distribution</h2>
      <div class="chart-wrap chart-wrap--compact">
        <canvas id="class-chart"></canvas>
      </div>
    </section>
  </main>
  <script src="/static/chart.umd.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
